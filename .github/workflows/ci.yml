name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests-and-reduced-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run reduced benchmark subset
        run: prompt-xray bench run --subset --out .prompt-xray/bench/reduced

      - name: Validate reduced benchmark against baseline
        run: python -m prompt_xray.bench_ci --baseline benchmarks/baselines/reduced/benchmark.json --candidate .prompt-xray/bench/reduced/benchmark.json

      - name: Upload reduced benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reduced-benchmark
          path: .prompt-xray/bench/reduced

  full-benchmark:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run full benchmark corpus
        run: prompt-xray bench run --out .prompt-xray/bench/full

      - name: Validate full benchmark against baseline
        run: python -m prompt_xray.bench_ci --baseline benchmarks/baselines/full/benchmark.json --candidate .prompt-xray/bench/full/benchmark.json

      - name: Upload full benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-benchmark
          path: .prompt-xray/bench/full
