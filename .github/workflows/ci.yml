name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests-and-reduced-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run reduced calibration subset
        run: prompt-xray bench run --split calibration --subset --out .prompt-xray/bench/reduced-calibration

      - name: Validate reduced calibration benchmark against baseline
        run: python -m prompt_xray.bench_ci --baseline benchmarks/baselines/reduced-calibration/benchmark.json --candidate .prompt-xray/bench/reduced-calibration/benchmark.json

      - name: Run reduced holdout subset
        run: prompt-xray bench run --split holdout --subset --out .prompt-xray/bench/reduced-holdout

      - name: Validate reduced holdout benchmark against baseline
        run: python -m prompt_xray.bench_ci --baseline benchmarks/baselines/reduced-holdout/benchmark.json --candidate .prompt-xray/bench/reduced-holdout/benchmark.json

      - name: Upload reduced benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reduced-benchmark
          path: |
            .prompt-xray/bench/reduced-calibration
            .prompt-xray/bench/reduced-holdout

  full-benchmark:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run full calibration benchmark corpus
        run: prompt-xray bench run --split calibration --out .prompt-xray/bench/calibration

      - name: Validate full calibration benchmark against baseline
        run: python -m prompt_xray.bench_ci --baseline benchmarks/baselines/calibration/benchmark.json --candidate .prompt-xray/bench/calibration/benchmark.json

      - name: Run full holdout benchmark corpus
        run: prompt-xray bench run --split holdout --out .prompt-xray/bench/holdout

      - name: Validate full holdout benchmark against baseline
        run: python -m prompt_xray.bench_ci --baseline benchmarks/baselines/holdout/benchmark.json --candidate .prompt-xray/bench/holdout/benchmark.json

      - name: Run full combined benchmark corpus
        run: prompt-xray bench run --split all --out .prompt-xray/bench/full

      - name: Validate full combined benchmark against baseline
        run: python -m prompt_xray.bench_ci --baseline benchmarks/baselines/full/benchmark.json --candidate .prompt-xray/bench/full/benchmark.json

      - name: Upload full benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-benchmark
          path: |
            .prompt-xray/bench/calibration
            .prompt-xray/bench/holdout
            .prompt-xray/bench/full
